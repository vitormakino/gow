[[apps]]
title = "Blender"
icon_png_path = "https://download.blender.org/branding/community/blender_community_badge_white.png"

[apps.runner]
type = "docker"
name = "WolfBlender"
image = "ghcr.io/games-on-whales/blender:custom"
mounts = []
env = ["RUN_SWAY=1", "GOW_REQUIRED_DEVICES=/dev/input/* /dev/dri/* /dev/nvidia*", ]
devices = []
ports = []
base_create_json = """
{
  "HostConfig": {
    "IpcMode": "host",
    "Privileged": false,
    "CapAdd": ["NET_RAW", "MKNOD", "NET_ADMIN"],
    "DeviceCgroupRules": ["c 13:* rmw", "c 244:* rmw"]
  }
}
\
"""